# VISM-style objective with direct-SDF output.
# The physical components are optimized as raw integrated energies G_i on the bbox domain.
vism_objective: energy
weak_prior_target: box

losses:
  init_sdf:
    weight: 1.0
    groups: [global, containment, surface_band]
  containment:
    weight: 0.0
    groups: [containment]
  outside:
    weight: 1.0
    groups: [bbox_surface]
  weak_prior:
    weight: 0.0
    groups: [surface_band]
  area:
    weight: 1.0
    groups: [global, area]
  tolman_curvature:
    weight: 1.0
    groups: [global]
  pressure_volume:
    weight: 1.0
    groups: [global]
  lj_body:
    weight: 1.0
    groups: [global]
  electrostatic:
    weight: 1.0
    groups: [global]
  eikonal:
    weight: 0.1
    groups: [global, surface_band]

pressure: 0.01
rho_0: 0.0331
gamma_0: 0.1315
tolman_length: 1.0
tolman_fd_offset: 0.1
eps_solvent: 78.0
eps_solute: 1.0
electrostatic_dist_eps: 1.0
heaviside_eps: 0.1
delta_eps: 0.1
containment_margin: 0.5
outside_margin: 0.5

anneal:
  # epoch 0-4: fit bbox SDF only.
  # epoch 5-54: gradually hand control to the raw VISM energy.
  # epoch >=55: keep a weak bbox-SDF anchor so the zero level-set does not vanish.
  schedule: staged
  pretrain_epochs: 5
  ramp_epochs: 50
  initial_weights:
    init_sdf: 1.0
    containment: 0.0
    outside: 1.0
    weak_prior: 0.0
    area: 0.0
    tolman_curvature: 0.0
    pressure_volume: 0.0
    lj_body: 0.0
    electrostatic: 0.0
    eikonal: 0.0
  final_weights:
    init_sdf: 0.01
    containment: 0.0
    outside: 1.0
    weak_prior: 0.0
    area: 1.0
    tolman_curvature: 1.0
    pressure_volume: 1.0
    lj_body: 1.0
    electrostatic: 1.0
    eikonal: 0.1
